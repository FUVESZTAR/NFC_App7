name: Build APK

on:
  push:
    branches: [ main, master, copilot/* ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p PlantNFC/gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o PlantNFC/gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission for gradlew
        run: chmod +x PlantNFC/gradlew

      - name: Build debug APK
        run: cd PlantNFC && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlantNFC-debug
          path: PlantNFC/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
